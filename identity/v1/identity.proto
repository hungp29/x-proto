syntax = "proto3";

package identity.v1;

import "common/v1/common.proto";

option go_package = "github.com/hungp29/x-proto/gen/go/identity/v1;identityv1";

// ── AuthService messages ──────────────────────────────────────────────────────

message RegisterRequest {
  string email    = 1;
  string name     = 2;
  string password = 3;
}

message RegisterResponse {
  common.v1.User user = 1;
}

message LoginRequest {
  string email      = 1;
  string password   = 2;
  string ip_address = 3;
  string user_agent = 4;
}

message LoginResponse {
  common.v1.User      user   = 1;
  common.v1.TokenPair tokens = 2;
}

message LogoutRequest {
  string refresh_token = 1;
}

message LogoutResponse {}

message RefreshTokenRequest {
  string refresh_token = 1;
  string ip_address    = 2;
  string user_agent    = 3;
}

message RefreshTokenResponse {
  common.v1.TokenPair tokens = 1;
}

message ValidateTokenRequest {
  string access_token = 1;
}

message ValidateTokenResponse {
  string          user_id = 1;
  string          email   = 2;
  repeated string roles   = 3;
}

// ── AuthzService messages ─────────────────────────────────────────────────────

message CheckPermissionRequest {
  string user_id  = 1;
  string resource = 2;
  string action   = 3;
}

message CheckPermissionResponse {
  bool allowed = 1;
}

message GetUserPermissionsRequest {
  string user_id = 1;
}

message GetUserPermissionsResponse {
  repeated common.v1.Permission permissions = 1;
}

message AssignRoleRequest {
  string user_id    = 1;
  string role_name  = 2;
  int64  expires_at = 3; // unix seconds; 0 = permanent
  string granted_by = 4; // user_id of granter; empty = system
}

message AssignRoleResponse {}

message RevokeRoleRequest {
  string user_id   = 1;
  string role_name = 2;
}

message RevokeRoleResponse {}

// ── UserService messages ──────────────────────────────────────────────────────

message ListUsersRequest {
  common.v1.Pagination pagination = 1;

  // filters — empty/unset fields are ignored
  optional string email  = 10; // partial match on email
  optional string name   = 20; // partial match on name
  optional bool   locked = 30; // filter by lock status
}

message ListUsersResponse {
  repeated common.v1.User users           = 1;
  string                  next_page_token = 2; // empty when no more pages
  int32                   total_count     = 3;
}

message GetUserByIdRequest {
  string user_id = 10;
}

message GetUserByIdResponse {
  common.v1.User user = 1;
}

message GetUserByEmailRequest {
  string email = 10;
}

message GetUserByEmailResponse {
  common.v1.User user = 1;
}

message SearchUsersByEmailRequest {
  string query = 10; // prefix to search
  int32 limit = 20;
}

message SearchUsersByEmailResponse {
  repeated common.v1.User users = 1;
}

message UpdateUserRequest {
  string user_id = 10;

  // update fields
  optional string email = 20;
  optional string name  = 30;
}

message UpdateUserResponse {
  common.v1.User user = 1;
}

message DeleteUserByIdRequest {
  string user_id = 10;
}

message DeleteUserByIdResponse {
  bool success = 1;
}

// ── RoleService message ───────────────────────────────────────────────────────

message ListRolesRequest {
  common.v1.Pagination pagination = 1;

  // filters — empty/unset fields are ignored
  optional string name        = 10; // partial match on role name
  optional string description = 20; // partial match on description
}

message ListRolesResponse {
  repeated common.v1.Role roles           = 1;
  string                  next_page_token = 2; // empty when no more pages
  int32                   total_count     = 3;
}

message CreateRoleRequest {
  string name        = 10;
  string description = 20;
}

message CreateRoleResponse {
  common.v1.Role role = 1;
}

message GetRoleByIdRequest {
  string role_id = 10;
}

message GetRoleByIdResponse {
  common.v1.Role role = 1;
}

message GetRoleByNameRequest {
  string name = 10;
}

message GetRoleByNameResponse {
  common.v1.Role role = 1;
}

message SearchRolesByNameRequest {
  string query = 10; // prefix to search
  int32 limit = 20;
}

message SearchRolesByNameResponse {
  repeated common.v1.Role roles = 1;
}

message GetRolesByUserIdRequest {
  string user_id = 10;
}

message GetRolesByUserIdResponse {
  repeated common.v1.Role roles = 1;
}

message UpdateRoleRequest {
  string role_id = 10;

  // update fields
  optional string name        = 20;
  optional string description = 30;
}

message UpdateRoleResponse {
  common.v1.Role role = 1;
}

message DeleteRoleByIdRequest {
  string role_id = 10;
}

message DeleteRoleByIdResponse {
  bool success = 1;
}

message AddPermissionsToRoleRequest {
  string role_id                 = 10;
  repeated string permission_ids = 20;
}

message AddPermissionsToRoleResponse {
  bool success = 1;
}

message RemovePermissionsFromRoleRequest {
  string role_id                 = 10;
  repeated string permission_ids = 20;
}

message RemovePermissionsFromRoleResponse {
  bool success = 1;
}

message SetPermissionsForRoleRequest {
  string role_id                 = 10;
  repeated string permission_ids = 20;
}

message SetPermissionsForRoleResponse {
  bool success = 1;
}

// ── PermissionService message ─────────────────────────────────────────────────

message CreatePermissionRequest {
  string resource    = 10;
  string action      = 20;
  string description = 30;
}

message CreatePermissionResponse {
  common.v1.Permission permission = 1;
}

message GetPermissionsByResourceRequest {
  string resource = 10;
}

message GetPermissionsByResourceResponse {
  repeated common.v1.Permission permissions = 1;
}

message GetPermissionsByRoleIdRequest {
  string role_id = 10;
}

message GetPermissionsByRoleIdResponse {
  repeated common.v1.Permission permissions = 1;
}

message UpdatePermissionRequest {
  string permission_id = 10;

  // update fields
  optional string resource    = 20;
  optional string action      = 30;
  optional string description = 40;
}

message UpdatePermissionResponse {
  common.v1.Permission permission = 1;
}

message DeletePermissionByIdRequest {
  string permission_id = 10;
}

message DeletePermissionByIdResponse {
  bool success = 1;
}

message ListPermissionsRequest {
  common.v1.Pagination pagination = 1;

  // filters — empty/unset fields are ignored
  optional string resource    = 10;
  optional string action      = 20;
  optional string description = 30;
}

message ListPermissionsResponse {
  repeated common.v1.Permission permissions = 1;
  string                  next_page_token   = 2; // empty when no more pages
  int32                   total_count       = 3;
}

// ── SettingsService messages ──────────────────────────────────────────────────
//
// Settings are stored as key/value pairs with dot-namespaced keys:
//   general.language        → "en" | "vi"
//   general.theme           → "system" | "light" | "dark"
//   app.word.anki_deck_name → arbitrary string
//
// The caller's user_id is resolved from the auth context in x-gatekeeper
// (x-user-id gRPC metadata), so it does not appear in these messages.

message GetSettingsRequest {}

message GetSettingsResponse {
  // All settings for the authenticated user as key → value pairs.
  map<string, string> settings = 1;
}

message UpdateSettingsRequest {
  // Partial map: only the provided keys are updated. Existing keys not
  // present in this map are left unchanged.
  map<string, string> settings = 1;
}

message UpdateSettingsResponse {
  // Full settings map after the update.
  map<string, string> settings = 1;
}

// ── Services ──────────────────────────────────────────────────────────────────

// AuthService handles authentication: registration, login, token management.
service AuthService {
  rpc Register     (RegisterRequest)      returns (RegisterResponse);
  rpc Login        (LoginRequest)         returns (LoginResponse);
  rpc Logout       (LogoutRequest)        returns (LogoutResponse);
  rpc RefreshToken (RefreshTokenRequest)  returns (RefreshTokenResponse);
  rpc ValidateToken(ValidateTokenRequest) returns (ValidateTokenResponse);
}

// AuthzService handles authorization: permission checks and role management.
service AuthzService {
  rpc CheckPermission    (CheckPermissionRequest)    returns (CheckPermissionResponse);
  rpc GetUserPermissions (GetUserPermissionsRequest) returns (GetUserPermissionsResponse);
  rpc AssignRole         (AssignRoleRequest)         returns (AssignRoleResponse);
  rpc RevokeRole         (RevokeRoleRequest)         returns (RevokeRoleResponse);
}

// UserService: list, get, search, update, delete user
service UserService {
  rpc ListUsers          (ListUsersRequest)          returns (ListUsersResponse);
  rpc GetUserById        (GetUserByIdRequest)        returns (GetUserByIdResponse);
  rpc GetUserByEmail     (GetUserByEmailRequest)     returns (GetUserByEmailResponse);
  rpc SearchUsersByEmail (SearchUsersByEmailRequest) returns (SearchUsersByEmailResponse);
  rpc UpdateUser         (UpdateUserRequest)         returns (UpdateUserResponse);
  rpc DeleteUserById     (DeleteUserByIdRequest)     returns (DeleteUserByIdResponse);
}

// RoleService: list, create, get, search, update, delete role
service RoleService {
  rpc ListRoles         (ListRolesRequest)         returns (ListRolesResponse);
  rpc CreateRole        (CreateRoleRequest)        returns (CreateRoleResponse);
  rpc GetRoleById       (GetRoleByIdRequest)       returns (GetRoleByIdResponse);
  rpc GetRoleByName     (GetRoleByNameRequest)     returns (GetRoleByNameResponse);
  rpc GetRolesByUserId  (GetRolesByUserIdRequest)  returns (GetRolesByUserIdResponse);
  rpc SearchRolesByName (SearchRolesByNameRequest) returns (SearchRolesByNameResponse);
  rpc UpdateRole        (UpdateRoleRequest)        returns (UpdateRoleResponse);
  rpc DeleteRoleById    (DeleteRoleByIdRequest)    returns (DeleteRoleByIdResponse);

  // role - permission
  rpc AddPermissionsToRole      (AddPermissionsToRoleRequest)      returns (AddPermissionsToRoleResponse);
  rpc RemovePermissionsFromRole (RemovePermissionsFromRoleRequest) returns (RemovePermissionsFromRoleResponse);
  rpc SetPermissionsForRole     (SetPermissionsForRoleRequest)     returns (SetPermissionsForRoleResponse);
}

// PermissionService: create, get permission
service PermissionService {
  rpc ListPermissions          (ListPermissionsRequest)          returns (ListPermissionsResponse);
  rpc CreatePermission         (CreatePermissionRequest)         returns (CreatePermissionResponse);
  rpc GetPermissionsByResource (GetPermissionsByResourceRequest) returns (GetPermissionsByResourceResponse);
  rpc GetPermissionsByRoleId   (GetPermissionsByRoleIdRequest)   returns (GetPermissionsByRoleIdResponse);
  rpc UpdatePermission         (UpdatePermissionRequest)         returns (UpdatePermissionResponse);
  rpc DeletePermissionById     (DeletePermissionByIdRequest)     returns (DeletePermissionByIdResponse);
}

// SettingsService: get and update per-user settings.
// The caller's user_id is resolved from gRPC metadata (x-user-id) set by x-gatekeeper.
service SettingsService {
  rpc GetSettings    (GetSettingsRequest)    returns (GetSettingsResponse);
  rpc UpdateSettings (UpdateSettingsRequest) returns (UpdateSettingsResponse);
}