# Push proto → CI generates pb.go → auto-commit → create tag.
name: Generate and commit Go from proto

on:
  push:
    branches: [main]
    paths:
      - "**.proto"
      - "buf.yaml"
      - "buf.gen.yaml"
      - "go.mod"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buf
        uses: bufbuild/buf-setup-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Go code
        run: buf generate

      - name: Commit and push if generated files changed
        id: commit-push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gen/
          if git diff --staged --quiet; then
            echo "pushed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore(gen): regenerate Go from proto [skip ci]"
            git push
            echo "pushed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create and push tag
        if: steps.commit-push.outputs.pushed == 'true'
        run: |
          git pull origin main

          TAG="v0.1.${{ github.run_number }}"
          git tag "$TAG"
          git push origin "$TAG"
